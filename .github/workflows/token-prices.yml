name: Track token prices

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: token-prices
  cancel-in-progress: false

jobs:
  poll-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml pandas matplotlib

      - name: Fetch prices from OpenRouter
        run: python fetch_token_prices.py

      - name: Rebuild charts and summary
        run: python build_token_index.py

      - name: Commit results
        run: |
          git config user.name token-price-bot
          git config user.email actions@github.com
          git add data/token_prices.csv charts/ TOKEN_PRICE_SUMMARY.md
          git commit -m token-price-update || echo skip
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break
            echo retrying
            sleep 10
          done
