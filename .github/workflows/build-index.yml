name: Build Index Chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas matplotlib requests
      - name: Collect OpenRouter token data
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python check_tokens.py
      - run: python build_index.py
      - run: |
          git config user.name "gpu-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "rebuild index charts" || echo "nothing to commit"
          git commit -m "rebuild index charts" || echo "nothing to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break
            echo "push blocked, retrying in 10s..."
            sleep 10
          done
