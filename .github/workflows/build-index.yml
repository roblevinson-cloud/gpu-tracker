name: Build Index Chart

on:
  workflow_dispatch: {}   # run manually with a button
  schedule:
    - cron: "0 6 * * *"   # also rebuilds automatically once a day

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas matplotlib
      - run: python build_index.py
      - run: |
          git config user.name "gpu-tracker-bot"
          git config user.email "actions@github.com"
          git pull --rebase || true
          git add data/daily_index.csv data/index_chart.png
          git commit -m "rebuild index chart" || echo "nothing to commit"
          git push
